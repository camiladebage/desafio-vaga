<!-- create-task.component.html -->
<div class="p-6 max-w-xl mx-auto">
  <h1 class="text-2xl font-bold mb-6">
    Criar task - {{ leadName }}
  </h1>
  <form (ngSubmit)="save()" #form="ngForm" class="flex flex-col gap-4">
    <div>
      <label class="block mb-1 font-medium">Lead Associado</label>
      <input
        type="text"
        name="leadId"
        [(ngModel)]="leadId"
        readonly
        class="w-full border p-2 rounded bg-gray-100"
      />
    </div>

    <div>
      <label class="block mb-1 font-medium">Título</label>
      <input
        type="text"
        name="title"
        [(ngModel)]="title"
        required
        minlength="3"
        #titleRef="ngModel"
        class="w-full border p-2 rounded"
      />

      @if (titleRef.invalid && titleRef.touched) {
        <p class="text-red-500 text-sm mt-1">
          Título deve ter pelo menos 3 caracteres
        </p>
      }
    </div>

    <div>
      <label class="block mb-1 font-medium">Data de Vencimento</label>
      <input
        type="date"
        name="dueDate"
        [(ngModel)]="dueDate"
        required
        #dueDateRef="ngModel"
        class="w-full border p-2 rounded"
      />

      @if (dueDateRef.invalid && dueDateRef.touched) {
        <p class="text-red-500 text-sm mt-1">
          Data de vencimento é obrigatória
        </p>
      }
    </div>

    <div>
      <label class="block mb-1 font-medium">Status</label>
      <select
        name="status"
        [(ngModel)]="status"
        class="w-full border p-2 rounded"
      >
        <option value="Todo">Todo</option>
        <option value="Doing">Doing</option>
        <option value="Done">Done</option>
      </select>
    </div>

    <div class="flex gap-2 mt-4">
      <button
        type="submit"
        [disabled]="form.invalid"
        class="bg-blue-500 text-white px-4 py-2 rounded disabled:opacity-50">
        Criar Tarefa
      </button>

      <button
        type="button"
        (click)="cancel()"
        class="bg-gray-300 px-4 py-2 rounded">
        Cancelar
      </button>
    </div>
  </form>
</div>
